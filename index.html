<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연락처 스캐너</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #3B82F6; --bg: #F3F4F6; --surface: #FFFFFF; --text: #1F2937; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { background: var(--surface); max-width: 480px; width: 100%; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); padding: 24px; box-sizing: border-box; }
        h2 { margin-top: 0; font-size: 1.25rem; color: var(--text); text-align: center; }
        
        /* 버튼 스타일 */
        .upload-label { display: block; width: 100%; padding: 14px; background: #E5E7EB; color: #4B5563; text-align: center; border-radius: 8px; cursor: pointer; font-weight: 600; margin-bottom: 12px; box-sizing: border-box; transition: 0.2s; }
        .upload-label:hover { background: #D1D5DB; }
        input[type="file"] { display: none; }
        .btn { width: 100%; padding: 14px; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; display: none; margin-bottom: 12px; transition: 0.2s; }
        .btn-extract { background: var(--primary); display: none; }
        .btn-download { background: #10B981; margin-top: 20px; }
        .btn:disabled { background: #9CA3AF; cursor: not-allowed; }
        
        #status { text-align: center; font-size: 0.875rem; color: #6B7280; margin-bottom: 16px; min-height: 20px; }
        
        /* 연락처 리스트 스타일 */
        .contact-list { max-height: 50vh; overflow-y: auto; margin-bottom: 10px; padding-right: 5px; }
        .contact-item { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .contact-item input { flex: 1; padding: 10px; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 0.875rem; color: var(--text); outline: none; }
        .contact-item input:focus { border-color: var(--primary); }
        .remove-btn { background: #FEE2E2; color: #DC2626; border: none; padding: 10px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>

    <div class="app-container">
        <h2>📸 연락처 스캐너</h2>
        
        <label for="imageInput" class="upload-label" id="uploadLabel">1. 이미지 선택하기</label>
        <input type="file" id="imageInput" accept="image/*">
        
        <button id="extractBtn" class="btn btn-extract">2. 연락처 추출하기</button>
        <div id="status"></div>
        
        <div class="contact-list" id="resultArea"></div>
        
        <button id="downloadBtn" class="btn btn-download">📲 3. 주소록(.vcf) 다운로드</button>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const uploadLabel = document.getElementById('uploadLabel');
        const extractBtn = document.getElementById('extractBtn');
        const statusEl = document.getElementById('status');
        const resultArea = document.getElementById('resultArea');
        const downloadBtn = document.getElementById('downloadBtn');

        // 파일 선택 시 UI 변경
        imageInput.addEventListener('change', () => {
            if(imageInput.files.length > 0) {
                uploadLabel.innerText = `선택된 파일: ${imageInput.files[0].name}`;
                uploadLabel.style.background = '#DBEAFE';
                uploadLabel.style.color = '#1D4ED8';
                extractBtn.style.display = 'block';
                resultArea.innerHTML = '';
                downloadBtn.style.display = 'none';
            }
        });

        // OCR 추출
        extractBtn.addEventListener('click', async () => {
            const file = imageInput.files[0];
            if (!file) return;

            statusEl.innerText = "데이터를 분석 중입니다. 잠시만 기다려주세요...⏳";
            extractBtn.disabled = true;

            try {
                const result = await Tesseract.recognize(file, 'kor+eng');
                statusEl.innerText = "분석 완료! 오타가 있다면 직접 수정해 주세요.";
                renderEditableContacts(result.data.text);
            } catch (error) {
                statusEl.innerText = "오류가 발생했습니다.";
                console.error(error);
            } finally {
                extractBtn.disabled = false;
            }
        });

        // 추출된 텍스트를 Input 창으로 렌더링
        function renderEditableContacts(text) {
            resultArea.innerHTML = '';
            const lines = text.split('\n');
            const phoneRegex = /010[- .]?\d{3,4}[- .]?\d{4}/g;
            let count = 0;

            lines.forEach(line => {
                const phoneMatch = line.match(phoneRegex);
                if (phoneMatch) {
                    const phone = phoneMatch[0];
                    let name = line.replace(phone, '').replace(/[^가-힣a-zA-Z\s]/g, '').trim();
                    
                    if (name && phone) {
                        count++;
                        addContactRow(name, phone);
                    }
                }
            });

            if (count > 0) {
                downloadBtn.style.display = 'block';
            } else {
                statusEl.innerText = "연락처를 찾지 못했습니다.";
            }
        }

        // 개별 연락처 행(Row) 생성 함수
        function addContactRow(name, phone) {
            const row = document.createElement('div');
            row.className = 'contact-item';
            
            row.innerHTML = `
                <input type="text" class="name-input" value="${name}" placeholder="이름">
                <input type="text" class="phone-input" value="${phone}" placeholder="전화번호">
                <button class="remove-btn" onclick="this.parentElement.remove()" title="삭제">X</button>
            `;
            resultArea.appendChild(row);
        }

        // 다운로드 시 Input 창의 최신 데이터 수집 및 vCard 생성
        downloadBtn.addEventListener('click', async () => {
            const nameInputs = document.querySelectorAll('.name-input');
            const phoneInputs = document.querySelectorAll('.phone-input');
            let vcardText = "";

            for (let i = 0; i < nameInputs.length; i++) {
                const name = nameInputs[i].value.trim();
                const phone = phoneInputs[i].value.trim();
                
                if(name && phone) {
                    vcardText += "BEGIN:VCARD\n";
                    vcardText += "VERSION:3.0\n";
                    vcardText += `FN:${name}\n`;
                    vcardText += `TEL;TYPE=CELL:${phone}\n`;
                    vcardText += "END:VCARD\n";
                }
            }

            if(!vcardText) {
                alert("저장할 연락처가 없습니다.");
                return;
            }

            // vCard 파일 객체 생성
            const fileName = "contacts.vcf";
            const file = new File([vcardText], fileName, { type: "text/vcard" });

            // 모바일 공식 '공유/저장' 기능 (Web Share API) 지원 여부 확인
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: '연락처 스캐너',
                        text: '추출된 연락처를 폰에 저장하세요.'
                    });
                } catch (error) {
                    console.log('공유 취소 또는 실패:', error);
                    fallbackDownload(file, fileName); // 취소 시 기존 다운로드 방식 시도
                }
            } else {
                // PC이거나 Share API 미지원 브라우저인 경우 (기존 방식)
                fallbackDownload(file, fileName);
            }
        });

        // 기존의 강제 다운로드 방식 (PC용 예비책)
        function fallbackDownload(file, fileName) {
            const url = URL.createObjectURL(file);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        // 👆 여기까지 덮어씌우면 됩니다 👆
    </script>
</body>
</html>
